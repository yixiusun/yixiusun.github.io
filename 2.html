<!DOCTYPE html>
<head>
<style>
    :root {
        --primary-color: #26a69a;
        --bg-color: #000000;
        --surface-color: #070a0c;
        --text-color: white;
        --muted-color: #9aa3a7;
    }
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: var(--bg-color);
        color: var(--text-color);
        line-height: 1.6;
    }
    p {
        max-width: 720px;
        margin: 12vh auto 0;
        padding: 1.25rem 1.5rem;
        background: var(--surface-color);
        border-radius: 12px;
    }
</style>
</head>
<body>
<p>
Confidential now to avoid plagiarism. It will be available later.
</p>
</body>
