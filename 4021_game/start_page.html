<!DOCTYPE=html>
<html> 
<head>
    <style>
        :root {
            --primary-color: #26a69a;
            --hover-color: #4db6ac;
            --bg-color: #000000;
            --text-color: white;
        }
        body {
            margin: 0;
            padding: 0;
            font-size: 1.5rem;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        a {
            color: var(--primary-color);
            text-decoration: none;
        }
        a:hover {
            color: var(--hover-color);
            text-decoration: underline;
        }
        h2 {
            color: var(--primary-color);
        }
        .start-link {
            font-size: 1.2em;
        }
        .start-link .arrow {
            display: inline-block;
            transition: transform 0.25s ease;
        }
        .start-link:hover .arrow {
            transform: translateX(4px);
        }
    </style>
</head>
<body>
    <div style="display: flex; align-items: center;">
        <div style="flex: 1;">
            <img src="instruction.jpg" style="width: 100%; max-width: 600px; height: auto;">
        </div>
        <div style="flex: 1; padding-left: 20px;">
            <div>
                <h2>Controls:</h2>
                <p>
                Player 1: WASD; <br>
                Player 2: Arrow Keys.
                </p>
            </div>
            <a href="ver5.html" class="start-link"><b>Start Playing!  </b> <span class="arrow">&#10132;</span></a>
            <div>
                <p>
                    ps : press 'space' to toggle cheat mode for player 2.
                </p>
            </div>
        </div>
    </div>
</body>
</html>
