<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drums - SUN Yi Xiu</title>
    <style>
        :root {
            --primary-color: #26a69a;
            --hover-color: #4db6ac;
            --bg-color: #000000;
            --surface-color: #000000;
            --surface-alt: #000000;
            --text-color: white;
            --muted-color: #9aa3a7;
            --border-color: #000000;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.65;
        }

        .page-wrapper {
            max-width: 960px;
            margin: 0 auto;
            padding: 3rem 1.5rem 4rem;
        }

        .page-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 2.2rem;
        }

        h1 {
            margin: 0;
            color: var(--primary-color);
            font-size: 2rem;
            font-weight: 650;
        }

        .page-nav {
            color: var(--muted-color);
            font-size: 0.95rem;
        }

        a {
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        a:hover {
            color: var(--hover-color);
            text-decoration: underline;
        }

        .page-card {
            background-color: var(--surface-color);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
            padding: 2.5rem 2.75rem;
        }

        .intro {
            max-width: 720px;
            margin: 0 0 2rem;
            color: var(--text-color);
        }

        .drum-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .drum-list li {
            margin-bottom: 2rem;
            padding: 0.9rem 0;
            border-top: 1px solid var(--border-color);
        }

        .clip-title {
            margin: 0 0 0.75rem;
            color: var(--primary-color);
            font-weight: 600;
        }

        .video-frame {
            width: 100%;
            max-width: 720px;
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            overflow: hidden;
            background: var(--surface-alt);
        }

        .video-frame iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }

        @media (max-width: 720px) {
            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .page-card {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <main class="page-wrapper">
        <header class="page-header">
            <h1>Drums</h1>
            <nav class="page-nav">
                <a href="../index.html">Home</a>
            </nav>
        </header>

        <section class="page-card">
            <p class="intro">Here are some clips of me practicing drums. (There's no bgm because I was too lazy to add one, so I've only included the song titles as clues.)</p>

            <ul class="drum-list">
                <li>
                    <div class="video-frame">
                        <iframe
                            src="https://www.youtube.com/embed/JwvKjE2JvLE"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                            allowfullscreen>
                        </iframe>
                    </div>
                </li>
                <li>
                    <div class="video-frame">
                        <iframe
                            src="https://www.youtube.com/embed/yowPoJQZNlg"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                            allowfullscreen>
                        </iframe>
                    </div>
                </li>
                <li>
                    <div class="video-frame">
                        <iframe
                            src="https://www.youtube.com/embed/9Gps2DAOMjQ"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                            allowfullscreen>
                        </iframe>
                    </div>
                </li>
                <li>
                    <div class="video-frame">
                        <iframe
                            src="https://www.youtube.com/embed/b47128clGCE"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                            allowfullscreen>
                        </iframe>
                    </div>
                </li>

            </ul>
        </section>
    </main>
</body>
</html>
